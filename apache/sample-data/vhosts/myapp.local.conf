<VirtualHost *:80>
    ServerName myapp.local
    ServerAlias www.myapp.local

    # Each site gets its own sub-folder under the web root
    DocumentRoot /var/www/html/sites/myapp.local

    <Directory /var/www/html/sites/myapp.local>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.php$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.php [L]
        </IfModule>
    </Directory>

    # ── Security headers ──────────────────────────────────────────────────────
    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
    </IfModule>

    # ── Site-specific logs ────────────────────────────────────────────────────
    ErrorLog  /var/log/apache2/myapp.local-error.log
    CustomLog /var/log/apache2/myapp.local-access.log combined
</VirtualHost>

